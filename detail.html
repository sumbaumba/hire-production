<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>채널 운영 서비스 — HIGHER PRODUCTION</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

    .dp-nav {
      position: sticky; top: 0; z-index: 100;
      background: #fff; border-bottom: 1px solid rgba(0,0,0,.08);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 60px;
    }
    .dp-nav__logo img { height: 52px; width: auto; display: block; }
    .dp-nav__back {
      display: flex; align-items: center; gap: 8px;
      color: #1A3DEE; font-size: 13px; font-weight: 600;
      text-decoration: none; letter-spacing: .04em;
    }
    .dp-nav__back:hover { opacity: .7; }
    .dp-nav__back svg { width: 16px; height: 16px; }

    .dp-body { max-width: 800px; margin: 0 auto; }
    .dp-body img { display: block; width: 100%; height: auto; }

    .dp-cta {
      background: #1A3DEE; padding: 60px 40px; text-align: center;
    }
    .dp-cta p { color: rgba(255,255,255,.75); font-size: 16px; margin-bottom: 24px; }
    .dp-cta button {
      display: inline-block; background: #fff; color: #1A3DEE;
      font-size: 18px; font-weight: 800; padding: 18px 48px; border-radius: 6px;
      border: none; cursor: pointer; letter-spacing: -.01em; transition: opacity .15s;
      font-family: inherit;
    }
    .dp-cta button:hover { opacity: .85; }

    /* ── 문의 모달 ── */
    .cmod-overlay {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,.7); align-items: center; justify-content: center;
      padding: 16px; backdrop-filter: blur(6px); overflow-y: auto;
    }
    .cmod-overlay.open { display: flex; }
    .cmod-wrap {
      display: flex; align-items: stretch; margin: auto;
      max-width: 600px; width: 100%; border-radius: 16px;
      transition: max-width .4s cubic-bezier(.2,.7,.2,1); gap: 20px;
    }
    .cmod-wrap.plan-open { max-width: 1120px; }
    .cmod-box {
      background: #fafaf8; border-radius: 16px; flex: 0 0 580px; min-width: 0;
      overflow-y: auto; max-height: 90vh; box-shadow: 0 24px 80px rgba(0,0,0,.3);
    }
    .cmod-plan-panel {
      flex: 1; min-width: 0; overflow: hidden; border-radius: 16px;
      box-shadow: 0 24px 80px rgba(0,0,0,.25); display: none;
    }
    .cmod-wrap.plan-open .cmod-plan-panel { display: block; }
    .cmod-plan-panel img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
    .cmod-budget-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .cmod-plan-btn {
      background: none; border: 1.5px solid #1A3DEE; border-radius: 20px;
      padding: 4px 12px; font-size: 12px; font-weight: 700; color: #1A3DEE;
      cursor: pointer; letter-spacing: .03em; transition: all .15s; font-family: inherit;
    }
    .cmod-plan-btn:hover { background: #1A3DEE; color: #fff; }
    .cmod-head {
      padding: 36px 36px 24px; display: flex; justify-content: space-between;
      align-items: flex-start; border-bottom: 1px solid #eee;
    }
    .cmod-tag { font-size: 10px; letter-spacing: .1em; color: #1A3DEE; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; }
    .cmod-title { font-size: 24px; font-weight: 800; color: #0a0a0a; letter-spacing: -.04em; margin-bottom: 6px; }
    .cmod-sub { font-size: 13px; color: #888; }
    .cmod-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #bbb; padding: 0; line-height: 1; flex-shrink: 0; margin-top: 4px; }
    .cmod-close:hover { color: #0a0a0a; }
    .cmod-form { padding: 28px 36px 36px; display: flex; flex-direction: column; gap: 18px; }
    .cmod-field { display: flex; flex-direction: column; gap: 7px; }
    .cmod-field > label { font-size: 11px; font-weight: 700; color: #555; letter-spacing: .06em; text-transform: uppercase; }
    .req { color: #1A3DEE; }
    .cmod-row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .cmod-form input, .cmod-form textarea, .cmod-form select {
      border: 1.5px solid #e5e5e5; border-radius: 8px; padding: 11px 14px;
      font-size: 14px; color: #0a0a0a; outline: none; transition: border-color .15s;
      font-family: inherit; background: #fff;
    }
    .cmod-form input:focus, .cmod-form textarea:focus, .cmod-form select:focus {
      border-color: #1A3DEE; box-shadow: 0 0 0 3px rgba(26,61,238,.08);
    }
    .cmod-phone { display: flex; align-items: center; gap: 6px; }
    .cmod-phone input { width: 80px; text-align: center; }
    .cmod-phone span { color: #aaa; font-size: 16px; }
    .cmod-budget-btns { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 2px; }
    .cmod-budget-btn {
      padding: 10px 18px; border: 1.5px solid #e5e5e5; border-radius: 8px;
      background: #fff; color: #555; font-size: 14px; font-weight: 500;
      cursor: pointer; transition: all .15s; font-family: inherit;
    }
    .cmod-budget-btn:hover { border-color: #1A3DEE; color: #1A3DEE; }
    .cmod-budget-btn--on { background: #1A3DEE; border-color: #1A3DEE; color: #fff; font-weight: 700; }
    .cmod-form textarea { resize: vertical; min-height: 90px; }
    .cmod-submit {
      background: #0a0a0a; color: #fff; border: none; border-radius: 8px; padding: 16px;
      font-size: 15px; font-weight: 700; cursor: pointer; transition: background .15s;
      margin-top: 4px; letter-spacing: -.01em; font-family: inherit; width: 100%;
    }
    .cmod-submit:hover { background: #1A3DEE; }
    .cmod-note { font-size: 11px; color: #bbb; text-align: center; }
    .cmod-done { padding: 56px 36px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .cmod-done-icon { width: 56px; height: 56px; border-radius: 50%; background: #1A3DEE; color: #fff; font-size: 22px; display: flex; align-items: center; justify-content: center; }
    .cmod-done h4 { font-size: 20px; font-weight: 800; color: #0a0a0a; letter-spacing: -.03em; }
    .cmod-done p { font-size: 14px; color: #666; line-height: 1.7; }
    @media (max-width: 640px) {
      .dp-nav { padding: 0 16px; }
      .dp-nav__logo img { height: 40px; }
      .dp-body { max-width: 100%; }
      .dp-cta { padding: 40px 20px; }
      .cmod-overlay { padding: 0; align-items: flex-end; }
      .cmod-wrap { max-width: 100% !important; width: 100%; border-radius: 20px 20px 0 0; gap: 0; }
      .cmod-box { flex: 1 1 auto; border-radius: 20px 20px 0 0; max-height: 92vh; overflow-y: auto; box-shadow: none; }
      .cmod-plan-panel { display: none !important; }
      .cmod-head { padding: 24px 20px 20px; }
      .cmod-form { padding: 20px 20px 32px; gap: 14px; }
      .cmod-row2 { grid-template-columns: 1fr; }
      .cmod-title { font-size: 20px; }
      .cmod-budget-btns { gap: 6px; }
      .cmod-budget-btn { padding: 10px 14px; font-size: 13px; }
      .cmod-submit { padding: 16px; font-size: 15px; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>emailjs.init("zOUbWREObhSPvZDah");</script>
</head>
<body>

<!-- 문의 모달 -->
<div class="cmod-overlay" id="cmod">
  <div class="cmod-wrap" id="cmodWrap">
    <div class="cmod-plan-panel">
      <img src="./jpg/31.jpg" alt="플랜 안내">
    </div>
    <div class="cmod-box">
    <div class="cmod-head">
      <div>
        <div class="cmod-tag">HIGHER PRODUCTION</div>
        <h3 class="cmod-title">견적 · 문의하기</h3>
        <p class="cmod-sub">아래 내용을 작성해주시면 빠르게 검토 후 연락드리겠습니다.</p>
      </div>
      <button class="cmod-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div id="cmod-form-wrap">
      <form class="cmod-form" onsubmit="submitForm(event)">
        <div class="cmod-field">
          <label>제목 <span class="req">*</span></label>
          <input name="title" required placeholder="예) 브랜드 영상 제작 문의">
        </div>
        <div class="cmod-row2">
          <div class="cmod-field">
            <label>성함 <span class="req">*</span></label>
            <input name="name" required placeholder="홍길동">
          </div>
          <div class="cmod-field">
            <label>회사명</label>
            <input name="company" placeholder="하이어 프로덕션">
          </div>
        </div>
        <div class="cmod-field">
          <label>연락처 <span class="req">*</span></label>
          <div class="cmod-phone">
            <input name="p1" required maxlength="3" placeholder="010">
            <span>-</span>
            <input name="p2" required maxlength="4" placeholder="0000">
            <span>-</span>
            <input name="p3" required maxlength="4" placeholder="0000">
          </div>
        </div>
        <div class="cmod-row2">
          <div class="cmod-field">
            <label>이메일</label>
            <input name="email" type="email" placeholder="example@email.com">
          </div>
          <div class="cmod-field">
            <label>카테고리</label>
            <select name="category" id="categorySelect" onchange="toggleCategoryOther(this)">
              <option value="">선택</option>
              <option>TVCF · 광고</option>
              <option>브랜드 필름</option>
              <option>숏폼 · 바이럴</option>
              <option>유튜브 채널 운영</option>
              <option>기업 콘텐츠</option>
              <option>기타</option>
            </select>
            <input name="category_other" id="categoryOther" placeholder="직접 입력해주세요" style="display:none;margin-top:8px;">
          </div>
        </div>
        <div class="cmod-field">
          <div class="cmod-budget-head">
            <label>예산</label>
            <button type="button" class="cmod-plan-btn" id="planToggleBtn" onclick="togglePlan()">플랜 보기 →</button>
          </div>
          <div class="cmod-budget-btns" id="budgetBtns">
            <button type="button" class="cmod-budget-btn" onclick="selectBudget(this)">플랜 A</button>
            <button type="button" class="cmod-budget-btn" onclick="selectBudget(this)">플랜 B</button>
            <button type="button" class="cmod-budget-btn" onclick="selectBudget(this)">상담 후 협의</button>
            <button type="button" class="cmod-budget-btn" onclick="selectBudget(this)">기타</button>
          </div>
          <input name="budget_other" id="budgetOther" placeholder="예산을 직접 입력해주세요" style="display:none;margin-top:8px;">
        </div>
        <div class="cmod-field">
          <label>상세 요청사항</label>
          <textarea name="message" rows="4" placeholder="레퍼런스, 촬영 일정, 특이사항 등 자유롭게 작성해주세요."></textarea>
        </div>
        <button type="submit" class="cmod-submit">견적 받아보기 →</button>
        <p class="cmod-note">higher3pd@gmail.com · +82 10-3313-0388</p>
      </form>
    </div>
  </div>
  </div>
</div>

<nav class="dp-nav">
  <a href="./index.html" class="dp-nav__back">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M10 3L5 8l5 5"/>
    </svg>
    포트폴리오로 돌아가기

</nav>

    <img src="./jpg/34.gif" alt="포트폴리오 확인하러 가기" style="display:block;width:100%;">

</div>

<div class="dp-cta">
  <p>문의 및 상담은 아래로 연락해주세요</p>
  <button onclick="openModal()">문의하기 →</button>
</div>

<script>
  function openModal() {
    document.getElementById('cmod').classList.add('open');
    document.getElementById('cmod-form-wrap').innerHTML = document.getElementById('cmod-form-wrap').innerHTML;
  }
  function closeModal() {
    document.getElementById('cmod').classList.remove('open');
  }
  document.getElementById('cmod').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });
  function togglePlan() {
    const wrap = document.getElementById('cmodWrap');
    const btn = document.getElementById('planToggleBtn');
    wrap.classList.toggle('plan-open');
    btn.textContent = wrap.classList.contains('plan-open') ? '플랜 닫기 ×' : '플랜 보기 →';
  }
  function toggleCategoryOther(sel) {
    document.getElementById('categoryOther').style.display = sel.value === '기타' ? '' : 'none';
  }
  let selectedBudget = '';
  function selectBudget(btn) {
    document.querySelectorAll('.cmod-budget-btn').forEach(b => b.classList.remove('cmod-budget-btn--on'));
    btn.classList.add('cmod-budget-btn--on');
    selectedBudget = btn.textContent;
    document.getElementById('budgetOther').style.display = selectedBudget === '기타' ? '' : 'none';
  }
  function submitForm(e) {
    e.preventDefault();
    const fd = new FormData(e.target);
    const get = (k) => fd.get(k) || '';
    const phone = get('p1') + '-' + get('p2') + '-' + get('p3');
    const categoryVal = get('category') === '기타' ? '기타: ' + get('category_other') : get('category');
    const budgetVal = selectedBudget === '기타' ? '기타: ' + get('budget_other') : selectedBudget || '미선택';
    const btn = e.target.querySelector('.cmod-submit');
    btn.textContent = '전송 중...'; btn.disabled = true;
    const params = {
      title: get('title'), name: get('name'), company: get('company'),
      phone: phone, email: get('email'), category: categoryVal,
      budget: budgetVal, message: get('message')
    };
    emailjs.send('service_n3g4ozg', 'template_q6e6vna', params, 'zOUbWREObhSPvZDah')
      .then(function() {
        document.getElementById('cmod-form-wrap').innerHTML =
          '<div class="cmod-done">' +
          '<div class="cmod-done-icon">✓</div>' +
          '<h4>문의가 접수되었습니다!</h4>' +
          '<p>검토 후 영업일 기준 1~2일 내에<br>연락드리겠습니다. 감사합니다 :)</p>' +
          '<button class="cmod-submit" onclick="closeModal()" style="max-width:200px;margin:0 auto;">닫기</button>' +
          '</div>';
      })
      .catch(function() {
        btn.textContent = '견적 받아보기 →'; btn.disabled = false;
        alert('전송 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
      });
  }
</script>
</body>
</html>
