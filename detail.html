  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }

    .dp-nav {
      position: sticky; top: 0; z-index: 100;
      background: #fff; border-bottom: 1px solid rgba(0,0,0,.08);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 40px; height: 60px;
    }
    .dp-nav__logo img { height: 36px; width: auto; display: block; }
    .dp-nav__back {
      display: flex; align-items: center; gap: 8px;
      color: #1A3DEE; font-size: 13px; font-weight: 600;
      text-decoration: none; letter-spacing: .04em;
    }
    .dp-nav__back:hover { opacity: .7; }
    .dp-nav__back svg { width: 16px; height: 16px; }

    .dp-body {
      max-width: 800px;
      margin: 0 auto;
    }
    .dp-body img, .dp-body source {
      display: block;
      width: 100%;
      height: auto;
    }

    .dp-cta {
      background: #1A3DEE;
      padding: 60px 40px;
      text-align: center;
    }
    .dp-cta p { color: rgba(255,255,255,.75); font-size: 16px; margin-bottom: 24px; }
    .dp-cta a {
      display: inline-block;
      background: #fff; color: #1A3DEE;
      font-size: 18px; font-weight: 800;
      padding: 18px 48px; border-radius: 6px;
      text-decoration: none; letter-spacing: -.01em;
      transition: opacity .15s;
    }
    .dp-cta a:hover { opacity: .85; }
  </style>
</head>
